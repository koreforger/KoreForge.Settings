services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kf-settings-sql
    environment:
      SA_PASSWORD: "KoreForge_Dev_2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - kf_settings_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "KoreForge_Dev_2024!" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  kf_settings_data:
